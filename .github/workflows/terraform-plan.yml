name: "Terraform Plan"

on:
  pull_request:
    branches:
      - main

jobs:
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Terraform Init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TOROPON_IP: ${{ secrets.TOROPON_IP }}
          ARGOTUNNEL_CNAME_TARGET: ${{ secrets.ARGOTUNNEL_CNAME_TARGET }}
          GITHUB_PAGES_CHALLENGE_CONTENT: ${{ secrets.GITHUB_PAGES_CHALLENGE_CONTENT }}
        run: docker compose run --rm terraform init

      - name: Terraform Plan
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TOROPON_IP: ${{ secrets.TOROPON_IP }}
          ARGOTUNNEL_CNAME_TARGET: ${{ secrets.ARGOTUNNEL_CNAME_TARGET }}
          GITHUB_PAGES_CHALLENGE_CONTENT: ${{ secrets.GITHUB_PAGES_CHALLENGE_CONTENT }}
        run: docker compose run --rm terraform plan -no-color
